# FORCED MEMORY SETTINGS - Do not move these lines
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC -Dorg.gradle.daemon.performance.disable-logging=true
kotlin.daemon.jvmargs=-Xmx2048m

# Android & Gradle Performance
android.useAndroidX=true
android.enableJetifier=false
android.nonTransitiveRClass=true
org.gradle.parallel=true
org.gradle.caching=true

# Windows File Lock Fix
org.gradle.vfs.watch=false
